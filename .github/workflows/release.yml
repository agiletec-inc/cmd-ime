name: Release to Homebrew

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: version
        run: |
          # Get highest version tag (sort semantically)
          LATEST_TAG=$(git tag -l 'v*' | sort -t. -k1,1n -k2,2n -k3,3n | tail -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v1.0.0"
          fi
          CURRENT_VERSION=${LATEST_TAG#v}

          echo "📦 Current version: $CURRENT_VERSION (from $LATEST_TAG)"

          # Parse semver
          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"

          # Get commit messages since last tag
          COMMITS=$(git log ${LATEST_TAG}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          # Determine bump type based on conventional commits
          BUMP_TYPE="patch"

          if echo "$COMMITS" | grep -qE '^(feat!:|fix!:|BREAKING CHANGE:)'; then
            BUMP_TYPE="major"
          elif echo "$COMMITS" | grep -qE '^feat(\(.+\))?:'; then
            BUMP_TYPE="minor"
          fi

          # Calculate new version
          if [ "$BUMP_TYPE" = "major" ]; then
            NEW_VERSION="$((major + 1)).0.0"
          elif [ "$BUMP_TYPE" = "minor" ]; then
            NEW_VERSION="${major}.$((minor + 1)).0"
          else
            NEW_VERSION="${major}.${minor}.$((patch + 1))"
          fi

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          echo "🚀 Bumping $CURRENT_VERSION → $NEW_VERSION ($BUMP_TYPE)"

      - name: Check if already released
        id: check_tag
        run: |
          if git rev-parse "v${{steps.version.outputs.version}}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️  Tag v${{steps.version.outputs.version}} already exists, skipping"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✅ Will create release v${{steps.version.outputs.version}}"
          fi

      # A self-signed code-signing certificate gives the bundle a stable
      # Designated Requirement (anchored to the cert SHA-1 + bundle id),
      # which is what macOS TCC uses to remember Accessibility grants
      # across `brew upgrade --cask cmd-ime`. Without this, ad-hoc signing
      # produces a per-cdhash DR and the user has to re-grant Accessibility
      # on every release. See Issue #23.
      #
      # The step is gated on the secret being present so a release does not
      # fail before the cert has been minted and uploaded to org secrets;
      # `package.sh` falls back to ad-hoc when CMDIME_SIGNING_IDENTITY is
      # empty. Once the cert is in place the Verify step below upgrades
      # silent ad-hoc fallback to a hard failure.
      - name: Check signing secret availability
        if: steps.check_tag.outputs.exists == 'false'
        id: signing
        env:
          CERT_P12_BASE64: ${{ secrets.CMDIME_SIGNING_CERT_P12_BASE64 }}
        run: |
          if [ -n "$CERT_P12_BASE64" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::warning::CMDIME_SIGNING_CERT_P12_BASE64 is not set; release will fall back to ad-hoc signing (TCC grants will reset on upgrade)"
          fi

      - name: Import code-signing certificate
        if: steps.check_tag.outputs.exists == 'false' && steps.signing.outputs.available == 'true'
        env:
          CERT_P12_BASE64: ${{ secrets.CMDIME_SIGNING_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.CMDIME_SIGNING_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/cmdime-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(uuidgen)
          CERT_PATH="$RUNNER_TEMP/cmdime-signing.p12"

          echo "$CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign

          # Allow codesign to use the imported key without a UI prompt
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Prepend our keychain to the user search list so codesign -s "<name>" resolves it
          EXISTING_KEYCHAINS=$(security list-keychains -d user | tr -d '"')
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING_KEYCHAINS

          rm -f "$CERT_PATH"

      - name: Build macOS app
        if: steps.check_tag.outputs.exists == 'false'
        env:
          CMD_IME_VERSION: ${{ steps.version.outputs.version }}
          CMDIME_SIGNING_IDENTITY: ${{ vars.CMDIME_SIGNING_IDENTITY }}
        run: |
          cd apps/cmd-ime-swift

          # Build using existing script (reads CMDIME_SIGNING_IDENTITY)
          bash scripts/package.sh

          # Copy to release directory
          mkdir -p ../../release
          cp -R .build/release/CmdIME.app ../../release/

      - name: Verify code signature
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          set -euo pipefail
          codesign -dvv release/CmdIME.app 2>&1 | tee /tmp/codesign.log

          if [ "${{ steps.signing.outputs.available }}" = "true" ]; then
            # Cert is configured: ad-hoc fallback would silently regress TCC stability
            if grep -q "Signature=adhoc" /tmp/codesign.log; then
              echo "ERROR: bundle ended up ad-hoc signed despite cert being configured (identity import failed)" >&2
              exit 1
            fi
            echo "OK: signed with stable identity"
          else
            echo "::warning::bundle is ad-hoc signed; expected because CMDIME_SIGNING_CERT_P12_BASE64 is not set"
          fi

      - name: Create DMG
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION=${{steps.version.outputs.version}}

          # Create DMG using hdiutil
          hdiutil create -volname "CmdIME" \
            -srcfolder "release/CmdIME.app" \
            -ov -format UDZO \
            "cmd-ime-${VERSION}.dmg"

          echo "✅ DMG created: cmd-ime-${VERSION}.dmg"

      - name: Calculate SHA256
        if: steps.check_tag.outputs.exists == 'false'
        id: sha256
        run: |
          VERSION=${{steps.version.outputs.version}}
          SHA256=$(shasum -a 256 "cmd-ime-${VERSION}.dmg" | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "🔐 SHA256: $SHA256"

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        run: |
          VERSION=${{steps.version.outputs.version}}

          echo "🚀 Creating GitHub Release v${VERSION}..."

          gh release create "v${VERSION}" \
            --title "Release v${VERSION}" \
            --generate-notes \
            "cmd-ime-${VERSION}.dmg"

          echo "✅ Release v${VERSION} created successfully!"

      # Mint a 1-hour GitHub App installation token instead of using a
      # static PAT. The `agiletec-inc-homebrew-publisher` App is installed
      # on `homebrew-tap` only and shared via org-level credentials; same
      # pattern as airis-workspace's release.yml. This eliminates the
      # per-repo HOMEBREW_TAP_TOKEN PAT (which expires and breaks silently).
      - name: Generate Homebrew tap App token
        if: steps.check_tag.outputs.exists == 'false'
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.HOMEBREW_TAP_PUBLISHER_CLIENT_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_PUBLISHER_PRIVATE_KEY }}
          owner: agiletec-inc
          repositories: homebrew-tap

      - name: Update Homebrew cask via PR
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          VERSION=${{steps.version.outputs.version}}
          SHA256=${{steps.sha256.outputs.sha256}}

          echo "📦 Updating Homebrew cask..."
          echo "   Version: $VERSION"
          echo "   SHA256: $SHA256"

          # Clone homebrew-tap with the App's installation token
          git clone "https://x-access-token:${GH_TOKEN}@github.com/agiletec-inc/homebrew-tap.git"
          cd homebrew-tap

          BRANCH="release/cmd-ime-v${VERSION}"

          # Rerun safety: drop any stale ref from a previous failed attempt
          gh api -X DELETE "repos/agiletec-inc/homebrew-tap/git/refs/heads/${BRANCH}" 2>/dev/null || true

          git checkout -b "$BRANCH"

          mkdir -p Casks

          cat > Casks/cmd-ime.rb <<EOF
          cask "cmd-ime" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/agiletec-inc/cmd-ime/releases/download/v#{version}/cmd-ime-#{version}.dmg"
            name "⌘IME"
            desc "Command IME - Switch between alphanumeric and kana using Command keys"
            homepage "https://github.com/agiletec-inc/cmd-ime"

            livecheck do
              url :url
              strategy :github_latest
            end

            app "CmdIME.app"

            postflight do
              system_command "/usr/bin/xattr",
                             args: ["-cr", "#{appdir}/CmdIME.app"],
                             sudo: false
              # Refresh LaunchServices so the new bundle's icon and display
              # name are picked up immediately (otherwise Finder / System
              # Settings can show a stale entry).
              lsregister = "/System/Library/Frameworks/CoreServices.framework/" \\
                           "Frameworks/LaunchServices.framework/Support/lsregister"
              system_command lsregister,
                             args: ["-f", "#{appdir}/CmdIME.app"],
                             sudo: false
              # Auto-launch the new build so the user doesn't have to fish
              # for it after every upgrade.
              system_command "/usr/bin/open",
                             args: ["#{appdir}/CmdIME.app"],
                             sudo: false
            end

            # Gracefully quit the running menu bar agent before brew replaces
            # the .app, then SIGTERM/SIGKILL as fallback. AppleScript "quit"
            # alone is unreliable for an LSUIElement app under load, so the
            # signal stanza catches the process even if AE delivery fails.
            uninstall quit:   "com.kazuki.cmdime",
                      signal: [
                        ["TERM", "com.kazuki.cmdime"],
                        ["KILL", "com.kazuki.cmdime"],
                      ]

            zap trash: [
              "~/Library/Application Support/cmd-ime",
              "~/Library/Preferences/com.kazuki.cmdime.plist",
            ]
          end
          EOF

          git config user.name "agiletec-inc-homebrew-publisher[bot]"
          git config user.email "agiletec-inc-homebrew-publisher[bot]@users.noreply.github.com"

          git add Casks/cmd-ime.rb
          if git diff --cached --quiet; then
            echo "No changes to cask — skipping PR."
            exit 0
          fi
          git commit -m "Update cmd-ime to v${VERSION}"
          git push --set-upstream origin "$BRANCH"

          # Open and immediately squash-merge. The App is a bypass actor on
          # the `Homebrew tap protection` ruleset (bypass_mode: pull_request)
          # so the merge succeeds even with required reviews.
          PR_URL=$(gh pr create \
            --base "$(gh repo view --json defaultBranchRef --jq .defaultBranchRef.name)" \
            --head "$BRANCH" \
            --title "chore(cask): update cmd-ime to v${VERSION}" \
            --body "Automated cask update from \`agiletec-inc/cmd-ime@v${VERSION}\`. The publisher App bypasses required-review enforcement; this PR merges immediately.")

          gh pr merge --squash --delete-branch "$PR_URL"

          echo "✅ Homebrew cask updated to v${VERSION}"
